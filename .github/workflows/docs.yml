name: docs

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      DOCS_BRANCH: gh-pages
      DOCS_DOMAIN: ohs.ohsplayer.dev
      NO_MKDOCS_2_WARNING: "true"
      PYTHON_VERSION: "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Validate MkDocs build
        run: mkdocs build --strict

      - name: Fetch docs branch
        if: github.event_name != 'pull_request'
        run: git fetch origin "${DOCS_BRANCH}" --depth=1 || true

      - name: Configure git author
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish versioned docs
        if: github.event_name != 'pull_request'
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            mike deploy --alias-type redirect --update-aliases "${version}" latest
            mike set-default latest
          else
            mike deploy --alias-type redirect dev --title Development
            if mike list latest >/dev/null 2>&1; then
              mike set-default latest
            else
              mike set-default dev
            fi
          fi

      - name: Ensure GitHub Pages root files
        if: github.event_name != 'pull_request'
        run: |
          git checkout "${DOCS_BRANCH}"
          printf '%s\n' "${DOCS_DOMAIN}" > CNAME
          touch .nojekyll
          git add CNAME .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "chore(docs): maintain pages metadata"
          fi
          git push origin "HEAD:${DOCS_BRANCH}"

      - name: Show published versions
        if: github.event_name != 'pull_request'
        run: mike list
